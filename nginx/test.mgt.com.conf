## 1. CANONICAL PORT 80 EDGE INTERCEPTION (REDIRECT ALL TO HTTPS)
server {
    listen 80;
    server_name test.mgt.com;
    return 301 https://$host$request_uri;
}

## 2. PORT 443 SSL TERMINATION & GATEWAY TO VARNISH ACCELERATOR
server {
    listen 443 ssl;
    server_name test.mgt.com;

    ssl_certificate /etc/nginx/ssl/test.mgt.com.crt;
    ssl_certificate_key /etc/nginx/ssl/test.mgt.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:81; # Hands off requests safely to Varnish Cache
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

## 3. INTERNAL BACKEND NGINX PROCESS (ROUTING VARNISH MISSES TO PHP-FPM WORKERS)
server {
    listen 8080;
    server_name test.mgt.com;
    set $MAGE_ROOT /var/www/html/magento;
    include /var/www/html/magento/nginx.conf.sample; # Utilizes Magento template parameters cleanly
}

## 4. ISOLATED PHPMYADMIN DOMAIN MAPPING NODE
server {
    listen 80;
    server_name pma.mgt.com;

    root /usr/share/phpmyadmin;
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-test-ssh.sock; # Mapped onto the secure custom socket pool
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
